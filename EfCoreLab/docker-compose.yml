services:
  postgres:
    image: postgres:16-alpine
    container_name: eflab-postgres
    environment:
      POSTGRES_DB: eflab
      POSTGRES_USER: eflab
      POSTGRES_PASSWORD: eflab
    ports:
      - "5455:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eflab"]
      interval: 2s
      timeout: 2s
      retries: 15
